name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cpanel-deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
        run: npm run build

      - name: Validate deployment secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          CPANEL_REMOTE_DIR: ${{ vars.CPANEL_REMOTE_DIR }}
        run: |
          test -n "$FTP_SERVER" || (echo "Missing secret: FTP_SERVER" && exit 1)
          test -n "$FTP_USERNAME" || (echo "Missing secret: FTP_USERNAME" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "Missing secret: FTP_PASSWORD" && exit 1)
          test -n "$CPANEL_REMOTE_DIR" || (echo "Missing variable: CPANEL_REMOTE_DIR" && exit 1)

      - name: Deploy dist to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ vars.CPANEL_REMOTE_DIR }}
          port: 21
